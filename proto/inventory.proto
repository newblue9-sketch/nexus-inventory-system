syntax = "proto3";

package inventory;

// กำหนด Path สำหรับ Generate Code ภาษา Go
option go_package = "./pb";

// นิยามบริการสำหรับการจัดการสต็อก
service InventoryService {
  // รับ Request เพื่อดึงข้อมูลสินค้ารายชิ้น
  rpc GetItem (GetItemRequest) returns (GetItemResponse);

  // รับ Request เพื่อหักจำนวนสินค้าออกจากสต็อก
  rpc DeductStock (DeductStockRequest) returns (DeductStockResponse);
}

// ขาเข้า: ส่ง Product ID เพื่อระบุสินค้า
message GetItemRequest {
  int32 product_id = 1; 
}

// ขาออก: รายละเอียดสินค้าแบบครบถ้วน
message GetItemResponse {
  int32 product_id = 1;
  string name = 2;
  int32 quantity = 3;   // จำนวนคงเหลือในคลัง
  double price = 4;     // ราคาต่อหน่วย
}

// ขาเข้า: ระบุสินค้าและจำนวนที่ต้องการหักออก
message DeductStockRequest {
  int32 product_id = 1;
  int32 amount = 2;
}

// ขาออก: ผลลัพธ์การทำงานและสถานะปัจจุบัน
message DeductStockResponse {
  bool success = 1;              // สำเร็จหรือไม่?
  string error_message = 2;      // ถ้าล้มเหลว (เช่น Stock ไม่พอ) ให้บอกเหตุผล
  int32 remaining_quantity = 3;  // ยอดคงเหลือล่าสุดหลังตัดสต็อก
}